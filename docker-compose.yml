services:
  rankode-runner:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        LANGUAGES: ${LANGUAGES:-python3,go}
    image: rankode-runner:latest
    env_file:
      - .env
    privileged: true
    cgroup: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /tmp:exec,mode=1777,size=1g
    network_mode: host
    restart: unless-stopped
